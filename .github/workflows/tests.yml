name: PHPUnit

# NOTE: GitHub only runs workflows from the repository-root .github/workflows.
# In the Freelance Mexico monorepo this file is dormant (the plugin lives in a
# subdirectory); it activates automatically once the plugin is its own repo /
# WordPress.org SVN checkout. Kept here so the test setup travels with the code.

on:
  push:
    branches: [ main, trunk ]
  pull_request:

jobs:
  phpunit:
    name: PHP ${{ matrix.php }} / WP ${{ matrix.wp }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: [ '7.4', '8.0', '8.2', '8.3' ]
        wp: [ 'latest' ]

    services:
      mysql:
        image: mariadb:10.6
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s --health-timeout=5s --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mysqli, openssl
          tools: composer
          coverage: none

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress

      - name: Install the WordPress test suite
        run: bash bin/install-wp-tests.sh wordpress_test root root 127.0.0.1:3306 ${{ matrix.wp }}

      - name: Run PHPUnit
        run: composer test
